<!DOCTYPE html>
<html>
<head>
    <title>User CRUD</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f1f1;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .section {
            margin-top: 20px;
        }

        #message {
            text-align: center;
            color: red;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Register User</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="registerUser()">Register</button>

    <div class="section">
        <h2>All Users</h2>
        <button onclick="getUsers()">Display Users</button>
        <p id="message"></p>
        <ul id="userList"></ul>
    </div>

</div>

<script>

let BASE_URL = window.location.origin;

if (!BASE_URL.includes("localhost")) {
    BASE_URL = "http://localhost:8085";
}

// REGISTER
function registerUser() {
    const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    fetch(BASE_URL + "/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(user)
    })
    .then(res => res.json())
    .then(data => {
        alert("User Registered: " + data.name);
        getUsers();
    })
    .catch(err => showError("Error registering user"));
}

// GET USERS
function getUsers() {
    fetch(BASE_URL + "/display")
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("userList");
        const msg = document.getElementById("message");

        list.innerHTML = "";
        msg.innerText = "";

        if (data.length === 0) {
            msg.innerText = "No users found!";
            return;
        }

        data.forEach(user => {
            const li = document.createElement("li");
            li.innerText = `${user.id} | ${user.name} | ${user.email}`;
            list.appendChild(li);
        });
    })
    .catch(err => showError("Cannot connect to backend"));
}

// ERROR
function showError(msg) {
    document.getElementById("message").innerText = msg;
}

</script>

</body>
</html>
